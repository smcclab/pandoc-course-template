name: Build and Deploy Course Materials
on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/*'
      - 'lectures/**'
      - 'assessments/**'
      - 'workshops/**'
      - 'resources/**'
      - 'css/**'
      - 'Makefile'
      - '_config.toml'
      - 'references.bib'
      - 'apa.csl'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    container:
      image: pandoc/latex:3.9
      options: --user root

    steps:
      - name: Install Alpine Dependencies
        run: apk add --no-cache bash git python3 py3-pip py3-yaml make

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mark workspace as git safe directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Restore build cache
        uses: actions/cache@v4
        with:
          path: ./build
          key: build-v1-${{ hashFiles('Makefile', '_config.toml', 'references.bib', 'apa.csl') }}-${{ github.sha }}
          restore-keys: |
            build-v1-${{ hashFiles('Makefile', '_config.toml', 'references.bib', 'apa.csl') }}-

      - name: Restore file modification times (requires git and python3)
        uses: chetan/git-restore-mtime-action@v2

      - name: Install Latex Dependencies
        run: |
          tlmgr update --self
          tlmgr install libertine \
                  sourcecodepro \
                  ly1 \
                  sectsty \
                  lastpage \
                  hanging \
                  beamer \
                  beamertheme-metropolis \
                  pgfopts \
                  beamercolorthemeowl \
                  noto \
                  noto-emoji

      - name: Install Dart Sass
        run: |
          wget -O dart-sass.tar.gz https://github.com/sass/dart-sass/releases/download/1.89.2/dart-sass-1.89.2-linux-x64-musl.tar.gz
          tar -xzf dart-sass.tar.gz -C /usr/local/
          echo "/usr/local/dart-sass" >> $GITHUB_PATH
          rm dart-sass.tar.gz
          /usr/local/dart-sass/sass --version

      - name: Build public documents for website
        run: |
          make public

      - name: Install HTMLProofer
        run: |
          apk add --no-cache ruby
          gem install html-proofer --no-document

      - name: Check built site with HTMLProofer
        run: |
          htmlproofer ./build \
            --disable-external \
            --allow-hash-href \
            --ignore-missing-alt \
            --no-enforce-https

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./build

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
